name: Build EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout kody al
        uses: actions/checkout@v4

      - name: Python 3.11 gur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Gerekli paketleri gur
        run: |
          pip install pygame numpy pyinstaller

      - name: EXE faýl döret
        run: |
          pyinstaller --onefile --noconsole --name "GLOSA_3D_Sim" glosa_3d_sim.py

      - name: EXE faýly ýükle (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: GLOSA_3D_Sim_EXE
          path: dist/GLOSA_3D_Sim.exe
          retention-days: 30
